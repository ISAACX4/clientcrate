{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Customer | ClientCrate</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&family=Inter:wght@400;500;700;900&family=Noto+Sans:wght@400;500;700;900"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body class="bg-slate-50" style="font-family: Inter, 'Noto Sans', sans-serif;">
    <div class="min-h-screen flex flex-col">
      <!-- Header -->
      <header class="flex items-center justify-between border-b px-10 py-3 bg-white">
        <div class="flex items-center gap-8">
          <div class="flex items-center gap-4 text-[#0e141b]">
            <svg class="size-4" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z" fill="currentColor" />
            </svg>
            <h2 class="text-lg font-bold">ClientCrate</h2>
          </div>
          <nav class="flex items-center gap-9 text-sm font-medium">
            <a href="#">Dashboard</a>
            <a href="#">Orders</a>
            <a href="#">Products</a>
            <a href="#" class="text-blue-600">Customers</a>
            <a href="#">Analytics</a>
          </nav>
        </div>
      </header>

      <!-- Page Content -->
      <main class="flex-1 px-40 py-8">
        <div class="max-w-[640px] mx-auto bg-white p-8 rounded-xl shadow">
          <h1 class="text-2xl font-bold text-[#0e141b] mb-6">Edit Customer</h1>
          <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
              <label class="block text-sm font-medium text-[#0e141b] mb-1">Name</label>
              <input
                type="text"
                name="name"
                value="{{ form.name.value|default:'' }}"
                class="w-full rounded-lg border border-gray-300 px-4 py-2 text-sm"
                required
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-[#0e141b] mb-1">Email</label>
              <input
                type="email"
                name="email"
                value="{{ form.email.value|default:'' }}"
                class="w-full rounded-lg border border-gray-300 px-4 py-2 text-sm"
                required
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-[#0e141b] mb-1">Phone</label>
              <input
                type="text"
                name="phone"
                value="{{ form.phone.value|default:'' }}"
                class="w-full rounded-lg border border-gray-300 px-4 py-2 text-sm"
                required
              />
            </div>

            <div class="flex justify-between items-center pt-4">
              <a href="{% url 'customer_list' %}" class="text-sm text-gray-500 hover:underline">Cancel</a>
              <button
                type="submit"
                class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700"
              >
                Save Changes
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
